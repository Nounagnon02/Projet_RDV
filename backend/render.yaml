services:
  - type: web
    name: projet-rdv-backend
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: |
      php artisan migrate --force
      php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: projet-rdv-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: projet-rdv-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: projet-rdv-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: projet-rdv-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: projet-rdv-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: errorlog

databases:
  - name: projet-rdv-db
    plan: free
    databaseName: projet_rdv
    user: projet_rdv_user
