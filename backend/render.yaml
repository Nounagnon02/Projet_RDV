services:
  - type: web
    name: projet-rdv-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: projet-rdv-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: projet-rdv-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: projet-rdv-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: projet-rdv-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: projet-rdv-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: errorlog
      - key: FRONTEND_URL
        sync: false

databases:
  - name: projet-rdv-db
    plan: free
    databaseName: projet_rdv
    user: projet_rdv_user
